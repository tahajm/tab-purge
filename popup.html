<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TabPurge</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="header-actions">
      <button id="toggleAddBtn" class="toggle-add-btn">
        <span class="plus-icon">+</span>
        <span>Add Domain</span>
      </button>
      <button id="closeAllBtn" class="close-all-btn hidden">Close All</button>
    </div>
    
    <div id="addFormContainer" class="add-form-container hidden">
      <div class="input-group">
        <input id="domainInput" placeholder="Domain (e.g., gitlab.com)" />
        <input id="titleInput" placeholder="Title (optional)" />
        <div id="errorMessage" class="error-message"></div>
      </div>
      <div class="form-buttons">
        <button id="addDomain" class="add-btn">Add</button>
        <button id="cancelBtn" class="cancel-btn">Cancel</button>
      </div>
    </div>
    
    <div id="domainList"></div>
    
    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h3>Close All Tabs?</h3>
        <p>This will close all tabs matching the domains in your list.</p>
        <div class="modal-actions">
          <button id="confirmYes" class="modal-btn confirm-btn">Yes, Close All</button>
          <button id="confirmNo" class="modal-btn cancel-btn">Cancel</button>
        </div>
      </div>
    </div>
    
    <!-- Load scripts in order: utilities, storage, UI, then main -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/popup.js"></script>
  </body>
</html>
