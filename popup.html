<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Close Tabs by Domain</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 10px;
        width: 250px;
      }
      input,
      button {
        margin-bottom: 5px;
        width: 100%;
        padding: 6px;
        box-sizing: border-box;
      }
      .domain-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .domain-name {
        flex-grow: 1;
      }
    </style>
  </head>
  <body>
    <input id="domainInput" placeholder="Add domain (e.g., gitlab.com)" />
    <button id="addDomain">Add Domain</button>
    <div id="domainList"></div>
    <script src="popup.js"></script>
  </body>
</html>
